{% extends 'base.html' %}

{% block title %}Login - SecureBank{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-6 col-lg-5">
        <div class="card glass-panel border-0 shadow-lg p-5">
            <div class="text-center mb-4">
                <h2 class="fw-bold mb-1 text-light">Welcome to SecureBank</h2>
                <p class="text-light" style="opacity: 0.7;">Please select your login method below.</p>
            </div>
            
            <!-- Customer Login (Google OAuth) -->
            <div class="mb-5 text-center">
                <a href="{{ url_for('login_google') }}" class="btn-google-signin w-100 d-flex align-items-center justify-content-center text-decoration-none">
                    <svg viewBox="0 0 24 24" width="24" height="24" class="me-3" style="flex-shrink:0;">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    <span class="fw-semibold fs-5" style="color: #3c4043;">Continue with Google</span>
                </a>
                <small class="d-block mt-3" style="color: #94a3b8;">
                    <i class="fa-solid fa-shield-halved me-1"></i> Customers login securely via Google OAuth 2.0
                </small>
            </div>
            
            <div class="d-flex align-items-center mb-4">
                <hr class="flex-grow-1" style="border-color: rgba(255,255,255,0.15);">
                <span class="mx-3 small text-uppercase text-light" style="opacity:0.5; letter-spacing:2px;">Employee Login</span>
                <hr class="flex-grow-1" style="border-color: rgba(255,255,255,0.15);">
            </div>
            
            <!-- Manager Login Form -->
            <form action="{{ url_for('login') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label small fw-semibold text-light" style="opacity:0.7;">Employee ID</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent text-light" style="border-color: rgba(255,255,255,0.15);"><i class="fa-solid fa-id-badge"></i></span>
                        <input type="text" class="form-control bg-transparent text-light" name="employee_id" placeholder="e.g. EMP001" required style="border-color: rgba(255,255,255,0.15);">
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label small fw-semibold text-light" style="opacity:0.7;">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent text-light" style="border-color: rgba(255,255,255,0.15);"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" class="form-control bg-transparent text-light" name="password" placeholder="••••••••" required style="border-color: rgba(255,255,255,0.15);">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-premium btn-premium-primary w-100 py-2">
                    <i class="fa-solid fa-user-tie me-2"></i> Manager Login
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
